            messagingSenderId: "844417315192",
            appId: "1:844417315192:web:7dc7ea54edae9df6c6588d",
            measurementId: "G-2N90ZMMJYC"
        };

        const app = firebase.initializeApp(firebaseConfig);
        window.db = firebase.firestore(app);
        window.auth = firebase.auth(app);
        
        window.onAuthStateChanged = (authInstance, callback) => authInstance.onAuthStateChanged(callback);
        window.signInAnonymously = (authInstance) => authInstance.signInAnonymously();
        window.signInWithCustomToken = (authInstance, token) => authInstance.signInWithCustomToken(token);
        window.doc = (dbInstance, path) => dbInstance.doc(path);
        window.onSnapshot = (reference, callback, errorCallback) => reference.onSnapshot(snapshot => {
            callback({ exists: snapshot.exists, data: () => snapshot.data() });
        }, errorCallback);
        window.setDoc = (reference, payload, options) => reference.set(payload, options);
        window.getDoc = (reference) => reference.get().then(snapshot => ({ exists: snapshot.exists, data: () => snapshot.data() }));
    </script>
    
    <script>

                                row('3x5 Three of a Kind (Fives)', '500'), row('3x6 Three of a Kind (Sixes)', '600'), row('4x Four of a Kind', '1000'),
                                row('5x Five of a Kind', '2000'), row('6x Six of a Kind', '3000'), row('1-6 Straight (1,2,3,4,5,6)', '1500'),
                                row('3x Pair Three Pairs', '1500'), row('4+2 Four of a kind + Pair', '2000'), row('2x3 Two sets of three of a kind', '2500')
                            )
                        )
                    )
                )
            );
        };

        const App = () => {
            const COLLECTION_NAME = 'farkle_games';
            const [players, setPlayers] = useState([]);
            const [isAuthReady, setIsAuthReady] = useState(false);
            const [userId, setUserId] = useState(null);
            const [loading, setLoading] = useState(true);
            const [currentView, setCurrentView] = useState('scorer');
            const [showScoringGuide, setShowScoringGuide] = useState(false);

            const [showConfirm, setShowConfirm] = useState(false);
            const [confirmAction, setConfirmAction] = useState(null);

            const [gameId, setGameId] = useState('');
            const [isGameLoading, setIsGameLoading] = useState(false);
            
            const gameIdInputRef = useRef(null);
            const nameInputRef = useRef(null);
            const scoreInputRefs = useRef({});
            const unsubscribeFirestoreRef = useRef(null);

            const handleConfirm = (action, message) => {
                setConfirmAction(() => action);
                setConfirmMessage(message);
                setShowConfirm(true);
            };

            const handleConfirmDecision = (decision) => {
                if (decision && confirmAction) confirmAction();
                setShowConfirm(false);
                setConfirmAction(null);
            };

            const setupGameListener = (id) => {
                if (!window.db) { setError('Firestore not initialized.'); return; }
                if (unsubscribeFirestoreRef.current) unsubscribeFirestoreRef.current();
                setIsGameLoading(true);
                const docRef = window.doc(window.db, `${COLLECTION_NAME}/${id}`);
                unsubscribeFirestoreRef.current = window.onSnapshot(docRef, (docSnap) => {
                    try {
                        if (docSnap.exists) {
                            const data = docSnap.data();
                            const fetchedPlayers = data.players || [];
                            setPlayers(fetchedPlayers.sort((a, b) => b.score - a.score));
                        } else {
                            setPlayers([]);
                            setError(`Game '${id}' does not exist.`);
                        }
                    } catch (e) {
                        setError('Failed to fetch data: ' + e.message);
                    } finally {
                        setIsGameLoading(false);
                    }
                }, (e) => {
                    setError('Real-time updates failed: ' + e.message);
                    setIsGameLoading(false);
                });
            };

            const handleCreateGame = async () => {
                const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
                let newGameId = '';
                for (let i = 0; i < 5; i++) newGameId += characters.charAt(Math.floor(Math.random() * characters.length));
                const docRef = window.doc(window.db, `${COLLECTION_NAME}/${newGameId}`);
                try {
                    const docSnap = await window.getDoc(docRef);
                    if (docSnap.exists) { handleCreateGame(); return; }
                    await window.setDoc(docRef, { players: [] });
                    setGameId(newGameId);
                    setError(null);
                    setupGameListener(newGameId);
                } catch (e) { setError('Failed to create game: ' + e.message); }
            };

            const handleJoinGame = async () => {
                const joinGameId = gameIdInputRef.current.value.trim().toUpperCase();
                if (!joinGameId) { setError('Game ID cannot be empty.'); return; }
                if (joinGameId.length !== 5) { setError('Game ID must be 5 characters.'); return; }
                const docRef = window.doc(window.db, `${COLLECTION_NAME}/${joinGameId}`);
                const docSnap = await window.getDoc(docRef);
                if (!docSnap.exists) { setError(`No game found with ID: '${joinGameId}'.`); return; }
                setGameId(joinGameId);
                setError(null);
                setupGameListener(joinGameId);
            };

            useEffect(() => {
                let unsubscribeAuth = window.onAuthStateChanged(window.auth, (user) => {
                    setUserId(user ? user.uid : null);
                    setIsAuthReady(true);
                    setLoading(false);
                });
                window.signInAnonymously(window.auth).catch((e) => {
                    setError('Sign-in failed: ' + e.message);
                    setLoading(false);
                });
                return () => { unsubscribeAuth(); if (unsubscribeFirestoreRef.current) unsubscribeFirestoreRef.current(); };
            }, []);

            const handleAddPlayer = async () => {
                const newPlayerName = nameInputRef.current.value.trim();
                if (newPlayerName === '' || !gameId) return;
                try {
                    const docRef = window.doc(window.db, `${COLLECTION_NAME}/${gameId}`);
                    await window.setDoc(docRef, { players: [...players, { name: newPlayerName, score: 0, id: crypto.randomUUID() }] }, { merge: true });
                    nameInputRef.current.value = '';
                } catch (e) { setError('Failed to add player: ' + e.message); }
            };

            const handleUpdateScore = async (playerIndex) => {
                const inputElement = scoreInputRefs.current[playerIndex];
                const scoreToAdd = parseInt(inputElement.value, 10);
                if (isNaN(scoreToAdd) || scoreToAdd <= 0 || !gameId) return;
                try {
                    const docRef = window.doc(window.db, `${COLLECTION_NAME}/${gameId}`);
                    const updated = players.map((p, idx) => idx === playerIndex ? { ...p, score: p.score + scoreToAdd } : p);
                    await window.setDoc(docRef, { players: updated }, { merge: true });
                    inputElement.value = '';
                } catch (e) { setError('Failed to update score: ' + e.message); }
            };

            const handleResetScores = async () => {
                if (!gameId) return;
                try {
                    await window.setDoc(window.doc(window.db, `${COLLECTION_NAME}/${gameId}`), { players: players.map(p => ({ ...p, score: 0 })) });
                    setShowConfirm(false);
                } catch (e) { setError('Failed to reset scores: ' + e.message); }
            };

            const handleDeletePlayer = async (playerIndex) => {
                if (!gameId) return;
                try {
                    await window.setDoc(window.doc(window.db, `${COLLECTION_NAME}/${gameId}`), { players: players.filter((_, idx) => idx !== playerIndex) });
                    setShowConfirm(false);
                } catch (e) { setError('Failed to delete player: ' + e.message); }
            };

            const handleLeaveGame = () => {
                if (unsubscribeFirestoreRef.current) { unsubscribeFirestoreRef.current(); unsubscribeFirestoreRef.current = null; }
                setGameId(''); setPlayers([]); setError(null);
            };

            if (loading || !isAuthReady) {
                return e('div', { className: 'flex items-center justify-center min-h-screen bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-200' },

            }

            if (error) return e('div', { className: 'flex items-center justify-center min-h-screen bg-red-100 text-red-800 p-6 rounded-xl font-bold text-xl' }, e('p', null, 'An error occurred: ' + error));

            const ConfirmationModal = ({ message, onConfirm, onCancel }) => e('div', { className: 'fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center z-50 p-4' },

            if (!gameId) {

                        e('div', { className: 'mb-6' }, e('input', { ref: gameIdInputRef, type: 'text', placeholder: 'Enter Game ID', className: 'w-full p-4 rounded-xl border-2 border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 focus:outline-none focus:ring-4 focus:ring-indigo-500/20 text-center text-2xl font-bold tracking-widest text-white', onKeyDown: (e) => e.key === 'Enter' && handleJoinGame() })),
                        e('div', { className: 'flex' }, e('button', { onClick: handleJoinGame, className: 'flex-1 bg-indigo-500 hover:bg-indigo-600 text-white font-extrabold py-5 px-6 rounded-xl shadow-lg text-xl sm:text-2xl transition duration-200' }, 'Join Game'))
                    )
                );
            }

            if (currentView === 'scorer') {
                return e('div', { className: 'flex flex-col min-h-screen bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-200 p-4 sm:p-8' },
                    e('div', { className: 'flex flex-col sm:flex-row sm:justify-between sm:items-center mb-6 space-y-4 sm:space-y-0' },
                        e('h1', { className: 'text-4xl font-black text-indigo-600 dark:text-white tracking-tight' }, 'Score Entry'),
                        e('div', { className: 'flex space-x-3 w-full sm:w-auto' },
                            e('button', { onClick: () => setCurrentView('display'), className: 'flex-1 sm:flex-initial bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold py-3 px-5 rounded-full shadow-md flex items-center justify-center text-lg' }, e(TrophyIcon, { className: 'inline-block mr-2 h-6 w-6' }), 'Display View'),
                            e('button', { onClick: () => setShowScoringGuide(true), className: 'bg-gray-500 hover:bg-gray-600 text-white font-extrabold py-3 px-6 rounded-full shadow-md text-lg' }, 'Scoring')
                        )
                    ),
                    e('div', { className: 'flex items-center justify-between mb-6 bg-gray-200 dark:bg-gray-800 p-4 rounded-xl border border-gray-300 dark:border-gray-700' },
                        e('p', { className: 'font-bold text-2xl' }, 'Game ID: ', e('span', { className: 'font-black text-indigo-500 dark:text-yellow-400 tracking-wide' }, gameId)),
                        e('button', { onClick: handleLeaveGame, className: 'text-red-500 hover:text-red-400 text-lg font-extrabold tracking-wide uppercase' }, 'Leave Game')
                    ),
                    e('div', { className: 'mb-8 bg-white dark:bg-gray-800 p-5 rounded-xl shadow-md border border-gray-200 dark:border-gray-700' },
                        e('h2', { className: 'text-3xl font-extrabold mb-3 text-gray-900 dark:text-white' }, 'Add Player'),
                        e('div', { className: 'flex space-x-3' },
                            e('input', { ref: nameInputRef, type: 'text', placeholder: 'Enter player name', className: 'flex-grow p-4 text-xl rounded-xl border-2 border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 text-white focus:outline-none focus:ring-4 focus:ring-indigo-500/20', onKeyDown: (e) => e.key === 'Enter' && handleAddPlayer() }),
                            e('button', { onClick: handleAddPlayer, className: 'bg-green-500 hover:bg-green-600 text-white px-7 rounded-xl shadow-md flex items-center justify-center' }, e(PlusIcon, { className: 'h-8 w-8' }))
                        )
                    ),
                    e('div', { className: 'flex-grow overflow-y-auto space-y-4' },
                        isGameLoading ? e('div', { className: 'flex flex-col items-center py-10' }, e(DiceIcon, { className: 'text-6xl animate-spin text-indigo-500' }), e('p', { className: 'mt-4 text-xl font-bold' }, 'Loading game data...')) :
                        players.length === 0 ? e('p', { className: 'text-center text-gray-400 text-2xl font-bold py-12' }, 'No players added yet.') :
                        players.map((player, index) => e('div', { key: player.id, className: 'bg-white dark:bg-gray-800 p-5 rounded-xl shadow-md flex items-center justify-between border border-gray-200 dark:border-gray-700' },
                            e('div', { className: 'flex-grow truncate pr-4' }, e('p', { className: 'text-3xl font-black truncate text-gray-900 dark:text-white' }, player.name), e('p', { className: 'text-2xl font-black text-indigo-500 dark:text-indigo-400 mt-1' }, 'Score: ', player.score)),
                            e('div', { className: 'flex items-center space-x-3 flex-shrink-0' },
                                e('input', { ref: el => scoreInputRefs.current[index] = el, type: 'text', inputMode: 'numeric', pattern: '[0-9]*', maxLength: '6', placeholder: 'Points', className: 'w-32 p-4 text-xl font-bold rounded-xl border-2 border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 text-center text-white focus:outline-none focus:ring-2 focus:ring-indigo-500', onKeyDown: (e) => e.key === 'Enter' && handleUpdateScore(index) }),
                                e('button', { onClick: () => handleUpdateScore(index), className: 'bg-indigo-500 hover:bg-indigo-600 text-white p-4 rounded-xl shadow-md' }, e(PlusIcon, { className: 'h-6 w-6' })),
                                e('button', { onClick: () => handleConfirm(() => handleDeletePlayer(index), `Are you sure you want to remove ${player.name}?`), className: 'bg-red-500 hover:bg-red-600 text-white p-4 rounded-xl shadow-md' }, e(CloseIcon, { className: 'h-6 w-6' }))
                            )
                        ))
                    ),
                    e('div', { className: 'mt-8 flex flex-col sm:flex-row justify-center space-y-4 sm:space-y-0 sm:space-x-4 flex-shrink-0' },
                        e('button', { onClick: () => handleConfirm(handleResetScores, 'Are you sure you want to reset all scores?'), className: 'bg-red-500 hover:bg-red-600 text-white font-extrabold py-5 px-8 rounded-xl shadow-lg text-xl sm:text-2xl flex-1 text-center' }, 'Reset Scores'),
                        e('button', { onClick: () => setCurrentView('display'), className: 'bg-gray-500 hover:bg-gray-600 text-white font-extrabold py-5 px-8 rounded-xl shadow-lg text-xl sm:text-2xl flex-1 text-center' }, 'View Scoreboard')
                    )
                );
            }

            const winningScore = players.reduce((max, player) => Math.max(max, player.score), 0);
            const hasWinner = winningScore >= 10000;
            
            return e('div', { className: 'flex flex-col min-h-screen bg-gray-900 text-white p-4 sm:p-8 md:p-12' },
                e('div', { className: 'flex flex-col sm:flex-row sm:justify-between sm:items-center mb-8 space-y-4 sm:space-y-0' },
                    e('h1', { className: 'text-4xl md:text-6xl font-black tracking-tight text-center sm:text-left' }, 'Farkle Scoreboard'),
                    e('div', { className: 'flex space-x-3 w-full sm:w-auto' },
                        e('button', { onClick: () => setCurrentView('scorer'), className: 'flex-1 sm:flex-initial bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold py-4 px-6 rounded-full shadow-lg text-lg flex items-center justify-center' }, e(DiceIcon, { className: 'inline-block mr-2 h-5 w-5' }), 'Enter Scores'),
                        e('button', { onClick: () => setShowScoringGuide(true), className: 'bg-gray-500 hover:bg-gray-600 text-white font-extrabold py-4 px-6 rounded-full shadow-lg text-lg' }, 'Scoring')
                    )
                ),
                e('div', { className: 'flex items-center justify-between mb-6 bg-gray-800 p-4 rounded-xl border border-gray-700' },
                    e('p', { className: 'font-bold text-2xl md:text-3xl' }, 'Game ID: ', e('span', { className: 'font-black text-yellow-400' }, gameId)),
                    e('button', { onClick: handleLeaveGame, className: 'text-red-500 hover:text-red-400 text-lg font-extrabold tracking-wide uppercase' }, 'Leave Game')
                ),
                e('div', { className: 'flex-grow grid grid-cols-1 md:grid-cols-2 gap-6 overflow-y-auto' },
                    isGameLoading ? e('div', { className: 'md:col-span-2 flex flex-col items-center justify-center py-12' }, e(DiceIcon, { className: 'text-6xl animate-spin text-indigo-500' }), e('p', { className: 'mt-4 text-xl font-bold' }, 'Loading game data...')) :
                    players.length === 0 ? e('p', { className: 'md:col-span-2 text-center text-gray-500 text-3xl font-bold py-12' }, 'No players added yet.') :
                    players.map((player) => {
                        const scoreColor = hasWinner && player.score === winningScore ? 'text-gold-400' : 'text-white';
                        const scoreFontWeight = hasWinner && player.score === winningScore ? 'font-black' : 'font-bold';
                        const scoreDifference = player.score - winningScore;
                        return e('div', { key: player.id, className: 'bg-gray-800 rounded-xl shadow-lg p-6 flex flex-col items-center justify-center text-center border-2 border-gray-700' },
                            e('p', { className: 'text-4xl font-black text-gray-200 truncate w-full mb-2' }, player.name),
                            e('p', { className: `text-7xl md:text-8xl ${scoreFontWeight} ${scoreColor} mb-2` }, player.score),
                            hasWinner && e('div', { className: 'mt-3 flex flex-col items-center' },
                                player.score === winningScore && e(TrophyIcon, { className: 'text-gold-400 h-14 w-14 mb-2 animate-bounce' }),
                                e('p', { className: 'text-red-400 text-3xl font-black' }, scoreDifference)
                            )
                        );
                    })
                )
            );
        };

        const Wrapper = () => {
            const [showConfirm, setShowConfirm] = useState(false);
            const [confirmAction, setConfirmAction] = useState(null);
            const [confirmMessage, setConfirmMessage] = useState('');
            const [showScoringGuide, setShowScoringGuide] = useState(false);
            const [currentView, setCurrentView] = useState('scorer');

            window.setGlobalConfirm = (action, message) => { setConfirmAction(() => action); setConfirmMessage(message); setShowConfirm(true); };
            window.setGlobalScoring = (val) => setShowScoringGuide(val);
            window.setGlobalView = (val) => setCurrentView(val);

            return e('div', { className: 'min-h-screen flex flex-col bg-gray-100 dark:bg-gray-900' },
                showConfirm && e(ConfirmationModal, { message: confirmMessage, onConfirm: () => { if (confirmAction) confirmAction(); setShowConfirm(false); }, onCancel: () => setShowConfirm(false) }),
                showScoringGuide && e(ScoringGuide, { onClose: () => setShowScoringGuide(false) }),
                e(App)
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(Wrapper));
    </script>
</body>
</html>
