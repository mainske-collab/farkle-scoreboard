<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Farkle Scoreboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              gold: {
                400: '#FFD700',
              }
            }
          }
        }
      }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #111827; /* Midnight slate baseline background */
            min-height: 100vh;
        }
        #root {
            min-height: 100vh;
        }
    </style>
</head>
<body class="bg-gray-900">
    <div id="root" class="bg-gray-900"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
        console.log("Farkle Scoreboard: Version 1.7.0 Mobile Scaling Active");

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyClININqtn0HoO3ovVj8nJPlWKn9N5Lx90",
            authDomain: "farkle-scoreboard-afe9e.firebaseapp.com",
            projectId: "farkle-scoreboard-afe9e",
            storageBucket: "farkle-scoreboard-afe9e.firebasestorage.app",
            messagingSenderId: "844417315192",
            appId: "1:844417315192:web:7dc7ea54edae9df6c6588d",
            measurementId: "G-2N90ZMMJYC"
        };

        const app = firebase.initializeApp(firebaseConfig);
        window.db = firebase.firestore(app);
        window.auth = firebase.auth(app);
        
        window.onAuthStateChanged = (authInstance, callback) => authInstance.onAuthStateChanged(callback);
        window.signInAnonymously = (authInstance) => authInstance.signInAnonymously();
        window.signInWithCustomToken = (authInstance, token) => authInstance.signInWithCustomToken(token);
        window.doc = (dbInstance, path) => dbInstance.doc(path);
        window.onSnapshot = (reference, callback, errorCallback) => reference.onSnapshot(snapshot => {
            callback({ exists: snapshot.exists, data: () => snapshot.data() });
        }, errorCallback);
        window.setDoc = (reference, payload, options) => reference.set(payload, options);
        window.getDoc = (reference) => reference.get().then(snapshot => ({ exists: snapshot.exists, data: () => snapshot.data() }));
    </script>
    
    <script>
        const { useState, useEffect, useRef } = React;
        const e = React.createElement;

        const PlusIcon = ({ className }) => 
            e('svg', { xmlns: 'http://www.w3.org/2000/svg', className: className, viewBox: '0 0 24 24', fill: 'currentColor' },
                e('path', { d: 'M19 11h-6V5h-2v6H5v2h6v6h2v-6h6z' })
            );

        const CloseIcon = ({ className }) => 
            e('svg', { xmlns: 'http://www.w3.org/2000/svg', className: className, viewBox: '0 0 24 24', fill: 'currentColor' },
                e('path', { d: 'M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z' })
            );

        const TrophyIcon = ({ className }) => 
            e('svg', { xmlns: 'http://www.w3.org/2000/svg', className: className, viewBox: '0 0 24 24', fill: 'currentColor' },
                e('path', { d: 'M12 2c-3.31 0-6 2.69-6 6v3H4a2 2 0 00-2 2v7a2 2 0 002 2h16a2 2 0 002-2v-7a2 2 0 00-2-2h-2V8c0-3.31-2.69-6-6-6zm-4 9h8V8c0-2.21-1.79-4-4-4s-4 1.79-4 4v3zm12 9H4v-7h16v7z' }),
                e('path', { d: 'M10 14h4v4h-4z' })
            );

        const DiceIcon = ({ className }) => 
            e('svg', { xmlns: 'http://www.w3.org/2000/svg', className: className, viewBox: '0 0 24 24', fill: 'currentColor' },
                e('path', { d: 'M12 2c-5.52 0-10 4.48-10 10s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zM8 8.5c-.83 0-1.5-.67-1.5-1.5S7.17 5.5 8 5.5s1.5.67 1.5 1.5S8.83 8.5 8 8.5zm8 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5S16.83 8.5 16 8.5zm-4 4c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5S12.83 12.5 12 12.5zm-4 4c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5S8.83 16.5 8 16.5zm8 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5S16.83 16.5 16 16.5z' })
            );

        const ScoringGuide = ({ onClose }) => {
            const row = (comb, pts) => e('tr', { className: 'border-b border-gray-700 text-white' },
                e('td', { className: 'py-3 px-4 flex items-center' }, e('span', { className: 'text-2xl font-bold mr-2 text-yellow-400' }, comb.split(' ')[0]), comb.split(' ').slice(1).join(' ')),
                e('td', { className: 'py-3 px-4 text-right font-bold text-lg text-white' }, pts)
            );
            return e('div', { className: 'fixed inset-0 bg-gray-900 bg-opacity-95 flex flex-col items-center justify-center p-4 z-50 overflow-y-auto' },
                e('div', { className: 'bg-gray-800 text-white rounded-lg shadow-xl p-6 md:p-10 max-w-2xl w-full' },
                    e('div', { className: 'flex justify-between items-center mb-6' },
                        e('h2', { className: 'text-3xl md:text-4xl font-bold text-yellow-400' }, 'Farkle Scoring'),
                        e('button', { onClick: onClose, className: 'text-gray-400 hover:text-white transition-colors duration-200' }, e(CloseIcon, { className: 'w-8 h-8 md:w-10 md:h-10' }))
                    ),
                    e('div', { className: 'overflow-x-auto' },
                        e('table', { className: 'w-full text-left border-collapse' },
                            e('thead', null,
                                e('tr', null,
                                    e('th', { className: 'py-2 px-4 border-b-2 border-gray-600 text-gray-400 font-semibold text-sm md:text-base' }, 'Combination'),
                                    e('th', { className: 'py-2 px-4 border-b-2 border-gray-600 text-gray-400 font-semibold text-sm md:text-base text-right' }, 'Points')
                                )
                            ),
                            e('tbody', null,
                                row('1 Single One', '100'), row('5 Single Five', '50'), row('3x1 Three of a Kind (Ones)', '1000'),
                                row('3x2 Three of a Kind (Twos)', '200'), row('3x3 Three of a Kind (Threes)', '300'), row('3x4 Three of a Kind (Fours)', '400'),
                                row('3x5 Three of a Kind (Fives)', '500'), row('3x6 Three of a Kind (Sixes)', '600'), row('4x Four of a Kind', '1000'),
                                row('5x Five of a Kind', '2000'), row('6x Six of a Kind', '3000'), row('1-6 Straight (1,2,3,4,5,6)', '1500'),
                                row('3x Pair Three Pairs', '1500'), row('4+2 Four of a kind + Pair', '2000'), row('2x3 Two sets of three of a kind', '2500')
                            )
                        )
                    )
                )
            );
        };

        const App = () => {
            const COLLECTION_NAME = 'farkle_games';
            const [players, setPlayers] = useState([]);
            const [isAuthReady, setIsAuthReady] = useState(false);
            const [userId, setUserId] = useState(null);
            const [loading, setLoading] = useState(true);
            const [currentView, setCurrentView] = useState('scorer');
            const [showScoringGuide, setShowScoringGuide] = useState(false);
            const [error, setError] = useState(null);
            const [showConfirm, setShowConfirm] = useState(false);
            const [confirmAction, setConfirmAction] = useState(null);
            const [confirmMessage, setConfirmMessage] = useState('');
            const [gameId, setGameId] = useState('');
            const [isGameLoading, setIsGameLoading] = useState(false);
            
            const gameIdInputRef = useRef(null);
            const nameInputRef = useRef(null);
            const scoreInputRefs = useRef({});
            const unsubscribeFirestoreRef = useRef(null);

            const handleConfirm = (action, message) => {
                setConfirmAction(() => action);
                setConfirmMessage(message);
                setShowConfirm(true);
            };

            const handleConfirmDecision = (decision) => {
                if (decision && confirmAction) confirmAction();
                setShowConfirm(false);
                setConfirmAction(null);
            };

            const setupGameListener = (id) => {
                if (!window.db) return;
                if (unsubscribeFirestoreRef.current) unsubscribeFirestoreRef.current();
                setIsGameLoading(true);
                const docRef = window.doc(window.db, `${COLLECTION_NAME}/${id}`);
                unsubscribeFirestoreRef.current = window.onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists) {
                        const fetchedPlayers = docSnap.data().players || [];
                        setPlayers(fetchedPlayers.sort((a, b) => b.score - a.score));
                    } else {
                        setPlayers([]);
                        setError(`Game '${id}' does not exist.`);
                    }
                    setIsGameLoading(false);
                }, (e) => {
                    setError('Real-time updates failed: ' + e.message);
                    setIsGameLoading(false);
                });
            };

            const handleCreateGame = async () => {
                const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
                let newGameId = '';
                for (let i = 0; i < 5; i++) newGameId += characters.charAt(Math.floor(Math.random() * characters.length));
                const docRef = window.doc(window.db, `${COLLECTION_NAME}/${newGameId}`);
                try {
                    const docSnap = await window.getDoc(docRef);
                    if (docSnap.exists) { handleCreateGame(); return; }
                    await window.setDoc(docRef, { players: [] });
                    setGameId(newGameId);
                    setError(null);
                    setupGameListener(newGameId);
                } catch (e) { setError('Failed to create game: ' + e.message); }
            };

            const handleJoinGame = async () => {
                const joinGameId = gameIdInputRef.current.value.trim().toUpperCase();
                if (!joinGameId || joinGameId.length !== 5) { setError('Game ID must be 5 characters.'); return; }
                const docRef = window.doc(window.db, `${COLLECTION_NAME}/${joinGameId}`);
                const docSnap = await window.getDoc(docRef);
                if (!docSnap.exists) { setError(`No game found with ID: '${joinGameId}'.`); return; }
                setGameId(joinGameId);
                setError(null);
                setupGameListener(joinGameId);
            };

            useEffect(() => {
                let unsubscribeAuth = window.onAuthStateChanged(window.auth, (user) => {
                    setUserId(user ? user.uid : null);
                    setIsAuthReady(true);
                    setLoading(false);
                });
                window.signInAnonymously(window.auth).catch(() => {
                    setIsAuthReady(true);
                    setLoading(false);
                });
                return () => { unsubscribeAuth(); if (unsubscribeFirestoreRef.current) unsubscribeFirestoreRef.current(); };
            }, []);

            const handleAddPlayer = async () => {
                const newPlayerName = nameInputRef.current.value.trim();
                if (!newPlayerName || !gameId) return;
                try {
                    const docRef = window.doc(window.db, `${COLLECTION_NAME}/${gameId}`);
                    await window.setDoc(docRef, { players: [...players, { name: newPlayerName, score: 0, id: crypto.randomUUID() }] }, { merge: true });
                    nameInputRef.current.value = '';
                } catch (e) { setError('Failed to add player: ' + e.message); }
            };

            const handleUpdateScore = async (playerIndex) => {
                const inputElement = scoreInputRefs.current[playerIndex];
                const scoreToAdd = parseInt(inputElement.value, 10);
                if (isNaN(scoreToAdd) || scoreToAdd <= 0 || !gameId) return;
                try {
                    const docRef = window.doc(window.db, `${COLLECTION_NAME}/${gameId}`);
                    const updated = players.map((p, idx) => idx === playerIndex ? { ...p, score: p.score + scoreToAdd } : p);
                    await window.setDoc(docRef, { players: updated }, { merge: true });
                    inputElement.value = '';
                } catch (e) { setError('Failed to update score: ' + e.message); }
            };

            const handleResetScores = async () => {
                if (!gameId) return;
                try {
                    await window.setDoc(window.doc(window.db, `${COLLECTION_NAME}/${gameId}`), { players: players.map(p => ({ ...p, score: 0 })) });
                    setShowConfirm(false);
                } catch (e) { setError('Failed to reset: ' + e.message); }
            };

            const handleDeletePlayer = async (playerIndex) => {
                if (!gameId) return;
                try {
                    await window.setDoc(window.doc(window.db, `${COLLECTION_NAME}/${gameId}`), { players: players.filter((_, idx) => idx !== playerIndex) });
                    setShowConfirm(false);
                } catch (e) { setError('Failed to delete: ' + e.message); }
            };

            if (loading || !isAuthReady) {
                return window.auth && window.db ? 
                    e('div', { className: 'flex items-center justify-center min-h-screen text-white bg-gray-900' }, 
                        e('div', { className: 'flex flex-col items-center' }, e(DiceIcon, { className: 'text-6xl animate-spin text-indigo-500' }), e('p', { className: 'mt-4 text-xl font-semibold text-white' }, 'Connecting...'))
                    ) : null;
            }

            if (error) return e('div', { className: 'flex items-center justify-center min-h-screen bg-red-100 text-red-800 p-4' }, e('p', null, error));

            const ConfirmationModal = () => e('div', { className: 'fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center z-50 p-4' },
                e('div', { className: 'bg-gray-800 p-6 rounded-lg shadow-xl max-w-sm w-full mx-auto text-white' },
                    e('p', { className: 'text-lg font-semibold mb-4 text-white' }, confirmMessage),
                    e('div', { className: 'flex justify-end space-x-4' },
                        e('button', { onClick: () => handleConfirmDecision(false), className: 'px-4 py-2 rounded-lg text-gray-300 hover:bg-gray-700' }, 'Cancel'),
                        e('button', { onClick: () => handleConfirmDecision(true), className: 'px-4 py-2 rounded-lg bg-red-500 text-white hover:bg-red-600' }, 'Confirm')
                    )
                )
            );

            if (!gameId) {
                return e('div', { className: 'flex flex-col items-center justify-center min-h-screen p-4 text-white bg-gray-900' },
                    e('h1', { className: 'text-3xl font-bold mb-6 text-white' }, 'Start a New Game'),
                    e('div', { className: 'w-full max-w-sm' },
                        e('button', { onClick: handleCreateGame, className: 'w-full mb-4 bg-green-500 hover:bg-green-600 font-bold py-3 px-6 rounded-lg shadow-lg text-white' }, 'Create New Game'),
                        e('div', { className: 'flex items-center space-x-2 my-4' }, e('hr', { className: 'flex-grow border-gray-600' }), e('span', { className: 'text-gray-400' }, 'or'), e('hr', { className: 'flex-grow border-gray-600' })),
                        e('div', { className: 'mb-4' }, e('input', { ref: gameIdInputRef, type: 'text', placeholder: 'Enter Game ID', className: 'w-full p-3 rounded-lg bg-gray-800 border border-gray-700 text-center text-white focus:outline-none focus:ring-2 focus:ring-indigo-500', onKeyDown: (e) => e.key === 'Enter' && handleJoinGame() })),
                        e('button', { onClick: handleJoinGame, className: 'w-full bg-indigo-500 hover:bg-indigo-600 font-bold py-3 px-6 rounded-lg shadow-lg text-white' }, 'Join Game')
                    )
                );
            }

            if (currentView === 'scorer') {
                return e('div', { className: 'flex flex-col min-h-screen bg-gray-900 text-white p-4 sm:p-6' },
                    e('div', { className: 'flex justify-between items-center mb-6' },
                        e('h1', { className: 'text-2xl sm:text-3xl font-bold text-white' }, 'Score Entry'),
                        e('div', { className: 'flex space-x-2' },
                            e('button', { onClick: () => setCurrentView('display'), className: 'bg-indigo-600 font-bold py-2 px-3 sm:px-4 rounded-full flex items-center text-sm sm:text-base text-white' }, e(TrophyIcon, { className: 'mr-1 sm:mr-2 h-4 w-4 sm:h-5 sm:w-5' }), 'Display'),
                            e('button', { onClick: () => setShowScoringGuide(true), className: 'bg-gray-600 font-bold py-2 px-3 sm:px-4 rounded-full text-sm sm:text-base text-white' }, 'Scoring')
                        )
                    ),
                    e('div', { className: 'flex items-center justify-between mb-4 bg-gray-800 p-3 rounded-lg' },
                        e('p', { className: 'font-semibold text-white' }, 'Game ID: ', e('span', { className: 'text-indigo-400 font-bold' }, gameId)),
                        e('button', { onClick: () => setGameId(''), className: 'text-red-400 font-semibold text-sm' }, 'Leave Game')
                    ),
                    e('div', { className: 'mb-6' },
                        e('h2', { className: 'text-xl font-semibold mb-2 text-white' }, 'Add Player'),
                        e('div', { className: 'flex space-x-2' },
                            e('input', { ref: nameInputRef, type: 'text', placeholder: 'Enter player name', className: 'flex-grow p-3 rounded-lg bg-gray-800 border border-gray-700 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500', onKeyDown: (e) => e.key === 'Enter' && handleAddPlayer() }),
                            e('button', { onClick: handleAddPlayer, className: 'bg-green-500 p-3 rounded-lg text-white' }, e(PlusIcon, { className: 'h-6 w-6' }))
                        )
                    ),
                    e('div', { className: 'flex-grow overflow-y-auto' },
                        isGameLoading ? e('div', { className: 'text-center p-4 text-white' }, 'Loading players...') :
                        players.length === 0 ? e('p', { className: 'text-center text-gray-500 py-8' }, 'No players added yet.') :
                        players.map((p, idx) => e('div', { key: p.id, className: 'bg-gray-800 p-4 rounded-lg mb-4 flex items-center justify-between text-white' },
                            e('div', { className: 'flex-grow pr-2 truncate' }, e('p', { className: 'text-xl font-semibold text-white truncate' }, p.name), e('p', { className: 'text-gray-400' }, 'Score: ', p.score)),
                            e('div', { className: 'flex items-center space-x-1 sm:space-x-2 flex-shrink-0' },
                                e('input', { ref: el => scoreInputRefs.current[idx] = el, type: 'text', inputMode: 'numeric', pattern: '[0-9]*', placeholder: 'Points', className: 'w-16 sm:w-20 p-2 rounded-lg bg-gray-700 border border-gray-600 text-center text-white focus:outline-none', onKeyDown: (e) => e.key === 'Enter' && handleUpdateScore(idx) }),
                                e('button', { onClick: () => handleUpdateScore(idx), className: 'bg-indigo-500 p-2 rounded-lg text-white' }, e(PlusIcon, { className: 'h-5 w-5' })),
                                e('button', { onClick: () => handleConfirm(() => handleDeletePlayer(idx), `Remove ${p.name}?`), className: 'bg-red-500 p-2 rounded-lg text-white' }, e(CloseIcon, { className: 'h-5 w-5' }))
                            )
                        ))
                    ),
                    e('div', { className: 'mt-6 flex justify-center space-x-4' },
                        e('button', { onClick: () => handleConfirm(handleResetScores, 'Reset all player scores to 0?'), className: 'bg-red-500 font-bold py-3 px-4 sm:px-6 rounded-lg shadow-lg text-white text-sm sm:text-base flex-1 sm:flex-initial text-center' }, 'Reset Scores'),
                        e('button', { onClick: () => setCurrentView('display'), className: 'bg-gray-600 font-bold py-3 px-4 sm:px-6 rounded-lg shadow-lg text-white text-sm sm:text-base flex-1 sm:flex-initial text-center' }, 'View Board')
                    ),
                    showConfirm && e(ConfirmationModal),
                    showScoringGuide && e(ScoringGuide, { onClose: () => setShowScoringGuide(false) })
                );
            }

            const winningScore = players.reduce((max, p) => Math.max(max, p.score), 0);
            const hasWinner = winningScore >= 10000;

            return e('div', { className: 'flex flex-col min-h-screen bg-gray-900 text-white p-4 sm:p-6 md:p-12' },
                e('div', { className: 'flex justify-between items-center mb-6' },
                    e('h1', { className: 'text-2xl sm:text-4xl md:text-6xl font-extrabold text-white' }, 'Farkle Board'),
                    e('div', { className: 'flex space-x-2' },
                        e('button', { onClick: () => setCurrentView('scorer'), className: 'bg-indigo-600 font-bold py-2 px-3 sm:px-6 rounded-full flex items-center text-sm sm:text-base text-white' }, e(DiceIcon, { className: 'mr-1 sm:mr-2 h-4 w-4 sm:h-5 sm:w-5' }), 'Scores'),
                        e('button', { onClick: () => setShowScoringGuide(true), className: 'bg-gray-500 font-bold py-2 px-3 sm:px-6 rounded-full text-sm sm:text-base text-white' }, 'Scoring')
                    )
                ),
                e('div', { className: 'flex items-center justify-between mb-6 bg-gray-800 p-3 rounded-lg' },
                    e('p', { className: 'font-semibold text-base sm:text-lg text-white' }, 'Game ID: ', e('span', { className: 'text-yellow-400 font-bold' }, gameId)),
                    e('button', { onClick: () => setGameId(''), className: 'text-red-400 font-semibold text-sm' }, 'Leave Game')
                ),
                e('div', { className: 'flex-grow grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-6 overflow-y-auto' },
                    isGameLoading ? e('div', { className: 'col-span-full text-center text-white' }, 'Loading scoreboard...') :
                    players.length === 0 ? e('p', { className: 'col-span-full text-center text-gray-500 py-8' }, 'No players added yet.') :
                    players.map((p) => {
                        const isLeader = hasWinner && p.score === winningScore;
                        return e('div', { key: p.id, className: 'bg-gray-800 rounded-xl p-4 sm:p-6 flex flex-col items-center text-center border ' + (isLeader ? 'border-yellow-500 shadow-yellow-500/20 shadow-lg' : 'border-gray-700') },
                            e('p', { className: 'text-xl sm:text-2xl font-semibold text-gray-300 truncate w-full' }, p.name),
                            e('p', { className: 'text-4xl sm:text-5xl md:text-6xl font-black mt-2 ' + (isLeader ? 'text-yellow-400' : 'text-white') }, p.score),
                            hasWinner && e('div', { className: 'mt-2 flex flex-col items-center' },
                                isLeader ? e(TrophyIcon, { className: 'text-yellow-400 h-8 w-8 sm:h-10 sm:w-10 animate-bounce' }) :
                                e('p', { className: 'text-red-400 text-lg sm:text-xl font-bold' }, p.score - winningScore)
                            )
                        );
                    })
                ),
                showScoringGuide && e(ScoringGuide, { onClose: () => setShowScoringGuide(false) })
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
</body>
</html>
