<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farkle Scoreboard & World Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              gold: {
                400: '#FFD700',
              }
            }
          }
        }
      }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a202c;
            min-height: 100vh;
        }
        #root {
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/plain" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc, getDoc, updateDoc, collection, query, where, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyClININqtn0HoO3ovVj8nJPlWKn9N5Lx90",
            authDomain: "farkle-scoreboard-afe9e.firebaseapp.com",
            projectId: "farkle-scoreboard-afe9e",
            storageBucket: "farkle-scoreboard-afe9e.firebasestorage.app",
            messagingSenderId: "844417315192",
            appId: "1:844417315192:web:7dc7ea54edae9df6c6588d",
            measurementId: "G-2N90ZMMJYC"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.auth = getAuth(app);
        window.onAuthStateChanged = onAuthStateChanged;
        window.signInAnonymously = signInAnonymously;
        window.signInWithCustomToken = signInWithCustomToken;
        window.doc = doc;
        window.onSnapshot = onSnapshot;
        window.setDoc = setDoc;
        window.getDoc = getDoc;
        window.updateDoc = updateDoc;
        window.collection = collection;
        window.query = query;
        window.where = where;
        window.getDocs = getDocs;
        window.serverTimestamp = serverTimestamp;
    </script>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const COLLECTION_NAME = 'farkle_games';

            // --- SVGs ---
            const PlusIcon = ({ className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19 11h-6V5h-2v6H5v2h6v6h2v-6h6z" />
                </svg>
            );
            const CloseIcon = ({ className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" />
                </svg>
            );
            const TrophyIcon = ({ className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2c-3.31 0-6 2.69-6 6v3H4a2 2 0 00-2 2v7a2 2 0 002 2h16a2 2 0 002-2v-7a2 2 0 00-2-2h-2V8c0-3.31-2.69-6-6-6zm-4 9h8V8c0-2.21-1.79-4-4-4s-4 1.79-4 4v3zm12 9H4v-7h16v7z" />
                    <path d="M10 14h4v4h-4z" />
                </svg>
            );
            const DiceIcon = ({ className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2c-5.52 0-10 4.48-10 10s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zM8 8.5c-.83 0-1.5-.67-1.5-1.5S7.17 5.5 8 5.5s1.5.67 1.5 1.5S8.83 8.5 8 8.5zm8 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5S16.83 8.5 16 8.5zm-4 4c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5S12.83 12.5 12 12.5zm-4 4c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5S8.83 16.5 8 16.5zm8 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5S16.83 16.5 16 16.5z" />
                </svg>
            );
            const MapIcon = ({ className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" /><circle cx="12" cy="10" r="3" /></svg>
            );
            const HistoryIcon = ({ className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            );

            // --- State ---
            const [players, setPlayers] = useState([]);
            const [isAuthReady, setIsAuthReady] = useState(false);
            const [userId, setUserId] = useState(null);
            const [loading, setLoading] = useState(true);
            const [currentView, setCurrentView] = useState('scorer'); // scorer, display, history
            const [showScoringGuide, setShowScoringGuide] = useState(false);
            const [error, setError] = useState(null);
            const [showConfirm, setShowConfirm] = useState(false);
            const [confirmAction, setConfirmAction] = useState(null);
            const [confirmMessage, setConfirmMessage] = useState('');
            const [gameId, setGameId] = useState('');
            const [gameLocation, setGameLocation] = useState('Unknown Location');
            const [history, setHistory] = useState([]);
            const [isGameLoading, setIsGameLoading] = useState(false);
            
            const gameIdInputRef = useRef(null);
            const nameInputRef = useRef(null);
            const scoreInputRefs = useRef({});
            const unsubscribeFirestoreRef = useRef(null);

            // --- Geolocation Tool ---
            const fetchCityName = () => {
                return new Promise((resolve) => {
                    if (!navigator.geolocation) resolve("Remote Location");
                    navigator.geolocation.getCurrentPosition(
                        async (pos) => {
                            try {
                                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
                                const data = await response.json();
                                resolve(data.address.city || data.address.town || data.address.village || "Unknown Location");
                            } catch { resolve("Unknown Location"); }
                        },
                        () => resolve("Location Denied")
                    );
                });
            };

            const handleConfirm = (action, message) => {
                setConfirmAction(() => action);
                setConfirmMessage(message);
                setShowConfirm(true);
            };

            const handleConfirmDecision = (decision) => {
                if (decision && confirmAction) {
                    confirmAction();
                }
                setShowConfirm(false);
                setConfirmAction(null);
            };

            const setupGameListener = (id) => {
                if (!window.db) {
                    setError('Firestore not initialized.');
                    return;
                }
                if (unsubscribeFirestoreRef.current) {
                    unsubscribeFirestoreRef.current();
                }

                setIsGameLoading(true);
                const docRef = window.doc(window.db, `${COLLECTION_NAME}/${id}`);
                
                unsubscribeFirestoreRef.current = window.onSnapshot(docRef, (docSnap) => {
                    try {
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            const fetchedPlayers = data.players || [];
                            const sortedPlayers = fetchedPlayers.sort((a, b) => b.score - a.score);
                            setPlayers(sortedPlayers);
                            setGameLocation(data.location || 'Unknown Location');
                        } else {
                            setPlayers([]);
                            setError(`Game '${id}' does not exist.`);
                        }
                    } catch (e) {
                        setError('Failed to fetch data: ' + e.message);
                    } finally {
                        setIsGameLoading(false);
                    }
                }, (e) => {
                    setError('Real-time updates failed: ' + e.message);
                    setIsGameLoading(false);
                });
            };

            const handleCreateGame = async () => {
                const newGameId = Math.random().toString(36).substring(2, 7).toUpperCase();
                const docRef = window.doc(window.db, `${COLLECTION_NAME}/${newGameId}`);
                
                try {
                    const docSnap = await window.getDoc(docRef);
                    if (docSnap.exists()) {
                        handleCreateGame();
                        return;
                    }
                    
                    const loc = await fetchCityName();
                    await window.setDoc(docRef, { 
                        players: [], 
                        location: loc,
                        status: 'active',
                        createdAt: window.serverTimestamp()
                    });
                    setGameId(newGameId);
                    setGameLocation(loc);
                    setError(null);
                    setupGameListener(newGameId);
                } catch (e) {
                    setError('Failed to create game: ' + e.message);
                }
            };

            const handleJoinGame = async () => {
                const joinGameId = gameIdInputRef.current.value.trim().toUpperCase();
                if (!joinGameId) return;

                const docRef = window.doc(window.db, `${COLLECTION_NAME}/${joinGameId}`);
                const docSnap = await window.getDoc(docRef);

                if (!docSnap.exists()) {
                    setError(`No game found with ID: '${joinGameId}'.`);
                    return;
                }

                setGameId(joinGameId);
                setError(null);
                setupGameListener(joinGameId);
            };

            const handleFinalizeGame = async () => {
                if (!gameId) return;
                try {
                    const docRef = window.doc(window.db, `${COLLECTION_NAME}/${gameId}`);
                    await window.updateDoc(docRef, { 
                        status: 'finished', 
                        finishedAt: window.serverTimestamp() 
                    });
                    handleLeaveGame();
                    await fetchHistory();
                } catch (e) {
                    setError('Failed to archive game: ' + e.message);
                }
            };

            const fetchHistory = async () => {
                try {
                    setIsGameLoading(true);
                    const q = window.query(
                        window.collection(window.db, COLLECTION_NAME), 
                        window.where("status", "==", "finished")
                    );
                    const querySnap = await window.getDocs(q);
                    const games = querySnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    
                    games.sort((a, b) => {
                        const timeA = a.finishedAt?.seconds || 0;
                        const timeB = b.finishedAt?.seconds || 0;
                        return timeB - timeA;
                    });
                    
                    setHistory(games);
                    setCurrentView('history');
                } catch (e) {
                    setError('History lookup failed.');
                    console.error(e);
                } finally {
                    setIsGameLoading(false);
                }
            };

            useEffect(() => {
                if (!window.auth || !window.db) {
                    setError('Firebase SDK error.');
                    setLoading(false);
                    return;
                }
                const unsub = window.onAuthStateChanged(window.auth, (user) => {
                    if (user) setUserId(user.uid);
                    setIsAuthReady(true);
                    setLoading(false);
                });
                window.signInAnonymously(window.auth);
                return () => unsub();
            }, []);

            const handleAddPlayer = async () => {
                const name = nameInputRef.current.value.trim();
                if (!name || !gameId) return;
                const docRef = window.doc(window.db, `${COLLECTION_NAME}/${gameId}`);
                const newPlayers = [...players, { name, score: 0, id: crypto.randomUUID() }];
                await window.setDoc(docRef, { players: newPlayers }, { merge: true });
                nameInputRef.current.value = '';
            };

            const handleUpdateScore = async (playerIndex) => {
                const inputElement = scoreInputRefs.current[playerIndex];
                const scoreToAdd = parseInt(inputElement.value, 10);
                if (isNaN(scoreToAdd) || scoreToAdd <= 0 || !gameId) return;

                const docRef = window.doc(window.db, `${COLLECTION_NAME}/${gameId}`);
                const updatedPlayers = players.map((p, idx) =>
                    idx === playerIndex ? { ...p, score: p.score + scoreToAdd } : p
                );
                await window.setDoc(docRef, { players: updatedPlayers }, { merge: true });
                inputElement.value = '';
            };

            const handleResetScores = async () => {
                if (!gameId) return;
                const docRef = window.doc(window.db, `${COLLECTION_NAME}/${gameId}`);
                const reset = players.map(p => ({ ...p, score: 0 }));
                await window.setDoc(docRef, { players: reset }, { merge: true });
                setShowConfirm(false);
            };
            
            const handleDeletePlayer = async (playerIndex) => {
                if (!gameId) return;
                const docRef = window.doc(window.db, `${COLLECTION_NAME}/${gameId}`);
                const updated = players.filter((_, idx) => idx !== playerIndex);
                await window.setDoc(docRef, { players: updated });
                setShowConfirm(false);
            };
            
            const handleLeaveGame = () => {
                if (unsubscribeFirestoreRef.current) unsubscribeFirestoreRef.current();
                setGameId('');
                setPlayers([]);
                setError(null);
                setCurrentView('scorer');
            };

            // --- Sub-Components ---
            const ScoringGuide = ({ onClose }) => (
                <div className="fixed inset-0 bg-gray-900 bg-opacity-95 flex flex-col items-center justify-center p-4 z-50 overflow-y-auto">
                    <div className="bg-gray-800 text-white rounded-lg shadow-xl p-6 max-w-md w-full">
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="text-2xl font-bold text-yellow-400">Scoring Guide</h2>
                            <button onClick={onClose} className="text-gray-400 hover:text-white"><CloseIcon className="w-6 h-6" /></button>
                        </div>
                        <div className="space-y-2 font-mono text-sm">
                            <div className="flex justify-between border-b border-gray-700 py-1"><span>Single 1</span><span className="text-green-400">100</span></div>
                            <div className="flex justify-between border-b border-gray-700 py-1"><span>Single 5</span><span className="text-green-400">50</span></div>
                            <div className="flex justify-between border-b border-gray-700 py-1"><span>Three 1s</span><span className="text-green-400">1000</span></div>
                            <div className="flex justify-between border-b border-gray-700 py-1"><span>Three 2s</span><span className="text-green-400">200</span></div>
                            <div className="flex justify-between border-b border-gray-700 py-1"><span>Three 3s</span><span className="text-green-400">300</span></div>
                            <div className="flex justify-between border-b border-gray-700 py-1"><span>Three 4s</span><span className="text-green-400">400</span></div>
                            <div className="flex justify-between border-b border-gray-700 py-1"><span>Three 5s</span><span className="text-green-400">500</span></div>
                            <div className="flex justify-between border-b border-gray-700 py-1"><span>Three 6s</span><span className="text-green-400">600</span></div>
                            <div className="flex justify-between border-b border-gray-700 py-1"><span>4 of a Kind</span><span className="text-green-400">1000</span></div>
                            <div className="flex justify-between border-b border-gray-700 py-1"><span>5 of a Kind</span><span className="text-green-400">2000</span></div>
                            <div className="flex justify-between border-b border-gray-700 py-1"><span>6 of a Kind</span><span className="text-green-400">3000</span></div>
                            <div className="flex justify-between border-b border-gray-700 py-1"><span>1-6 Straight</span><span className="text-green-400">1500</span></div>
                            <div className="flex justify-between border-b border-gray-700 py-1"><span>3 Pairs</span><span className="text-green-400">1500</span></div>
                        </div>
                    </div>
                </div>
            );

            const HistoryView = () => (
                <div className="p-6 text-white max-w-xl mx-auto flex flex-col h-full">
                    <div className="flex justify-between items-center mb-6">
                        <h1 className="text-3xl font-black text-indigo-400">Farkle Logs</h1>
                        <button onClick={() => setCurrentView('scorer')} className="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg font-bold">Back</button>
                    </div>
                    <div className="space-y-4 overflow-y-auto flex-grow">
                        {history.length === 0 ? <p className="text-gray-500 text-center mt-10">No saved games found.</p> : 
                            history.map(game => {
                                const sorted = [...(game.players || [])].sort((a,b) => b.score - a.score);
                                return (
                                    <div key={game.id} className="bg-gray-800 p-4 rounded-xl shadow border-l-4 border-emerald-500 flex justify-between items-center">
                                        <div>
                                            <div className="flex items-center space-x-1 text-gray-400 text-xs">
                                                <MapIcon className="w-3 h-3 text-red-400" />
                                                <span>{game.location}</span>
                                            </div>
                                            <div className="text-lg font-bold mt-1">Winner: <span className="text-gold-400">{sorted[0]?.name || 'Unknown'}</span></div>
                                        </div>
                                        <div className="text-right font-mono font-bold text-emerald-400 text-xl">{sorted[0]?.score || 0}</div>
                                    </div>
                                );
                            })
                        }
                    </div>
                </div>
            );

            const ScorerView = () => {
                if (!gameId) {
                    return <GameLobby onJoin={handleJoinGame} onCreate={handleCreateGame} />;
                }
                return (
                    <div className="flex flex-col h-full bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-200 p-4 sm:p-6">
                        <div className="flex justify-between items-center mb-6">
                            <h1 className="text-3xl font-bold">Scores</h1>
                            <div className="flex space-x-2">
                                <button onClick={() => setCurrentView('display')} className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-full shadow"><TrophyIcon className="inline-block mr-1 h-5 w-5" /> Display</button>
                                <button onClick={() => setShowScoringGuide(true)} className="bg-gray-600 text-white font-bold py-2 px-4 rounded-full">Scoring</button>
                            </div>
                        </div>
                        
                        <div className="flex items-center justify-between mb-4 bg-gray-200 dark:bg-gray-800 p-3 rounded-lg text-sm">
                            <span className="font-semibold">ID: <span className="text-indigo-500 font-bold">{gameId}</span> ({gameLocation})</span>
                            <button onClick={handleLeaveGame} className="text-red-500 font-semibold">Leave</button>
                        </div>

                        <div className="mb-6">
                            <div className="flex space-x-2">
                                <input ref={nameInputRef} type="text" placeholder="Player name" className="flex-grow p-3 rounded-lg bg-white dark:bg-gray-800 border-2 dark:border-gray-700" onKeyDown={(e) => e.key === 'Enter' && handleAddPlayer()} />
                                <button onClick={handleAddPlayer} className="bg-green-500 text-white p-3 rounded-lg"><PlusIcon className="h-6 w-6" /></button>
                            </div>
                        </div>

                        <div className="flex-grow overflow-y-auto space-y-4">
                            {players.map((player, index) => (
                                <div key={player.id} className="bg-white dark:bg-gray-800 p-4 rounded-lg shadow flex items-center justify-between">
                                    <div>
                                        <p className="text-xl font-bold">{player.name}</p>
                                        <p className="text-gray-500 dark:text-gray-400">Score: {player.score}</p>
                                    </div>
                                    <div className="flex items-center space-x-2">
                                        <input ref={el => scoreInputRefs.current[index] = el} type="text" inputMode="numeric" placeholder="Points" className="w-20 p-2 rounded bg-gray-50 dark:bg-gray-700 text-center" onKeyDown={(e) => e.key === 'Enter' && handleUpdateScore(index)} />
                                        <button onClick={() => handleUpdateScore(index)} className="bg-indigo-500 text-white p-2 rounded"><PlusIcon className="h-5 w-5" /></button>
                                        <button onClick={() => handleConfirm(() => handleDeletePlayer(index), 'Remove player?')} className="bg-red-500 text-white p-2 rounded"><CloseIcon className="h-5 w-5" /></button>
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div className="mt-6 flex space-x-4">
                            <button onClick={() => handleConfirm(handleResetScores, 'Reset current matrix scores?')} className="flex-1 bg-red-500 text-white font-bold py-3 rounded-lg">Reset</button>
                            {players.length > 0 && (
                                <button onClick={() => handleConfirm(handleFinalizeGame, 'Archive session permanently into Travel Logs?')} className="flex-1 bg-emerald-600 text-white font-bold py-3 rounded-lg">Archive Match</button>
                            )}
                        </div>
                    </div>
                );
            };

            const DisplayView = () => {
                if (!gameId) return <GameLobby onJoin={handleJoinGame} onCreate={handleCreateGame} />;
                const winningScore = players.reduce((max, p) => Math.max(max, p.score), 0);
                const hasWinner = winningScore >= 10000;
                
                return (
                    <div className="flex flex-col h-full bg-gray-900 text-white p-6 md:p-12">
                        <div className="flex justify-between items-center mb-6">
                            <h1 className="text-4xl font-black tracking-tight">Farkle Arena</h1>
                            <div className="flex space-x-2">
                                <button onClick={() => setCurrentView('scorer')} className="bg-indigo-600 px-4 py-2 rounded-full font-bold">Edit Mode</button>
                                <button onClick={() => setShowScoringGuide(true)} className="bg-gray-700 px-4 py-2 rounded-full font-bold">Scoring</button>
                            </div>
                        </div>

                        <div className="flex justify-between text-sm text-gray-400 mb-6">
                            <span>Room Code: <span className="text-yellow-400 font-bold">{gameId}</span></span>
                            <span className="flex items-center"><MapIcon className="w-4 h-4 text-red-400 mr-1"/>{gameLocation}</span>
                        </div>

                        <div className="flex-grow grid grid-cols-1 gap-4 overflow-y-auto">
                            {players.map((player) => {
                                const isLeader = hasWinner && player.score === winningScore;
                                const diff = player.score - winningScore;
                                return (
                                    <div key={player.id} className="bg-gray-800 rounded-xl p-6 flex flex-col items-center justify-center relative border border-gray-700">
                                        <p className="text-2xl text-gray-400 font-medium mb-1">{player.name}</p>
                                        <p className={`text-6xl font-black ${isLeader ? 'text-gold-400' : 'text-white'}`}>{player.score}</p>
                                        {hasWinner && (
                                            <div className="mt-2 text-center">
                                                {isLeader ? <TrophyIcon className="text-gold-400 w-8 h-8 mx-auto animate-bounce"/> : <span className="text-red-400 font-bold text-lg font-mono">{diff}</span>}
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            const GameLobby = ({ onJoin, onCreate }) => (
                <div className="flex flex-col items-center justify-center h-full p-6 text-center bg-gray-900 text-white">
                    <h1 className="text-4xl font-black tracking-wider mb-8 text-indigo-400">FARKLE TRACKER</h1>
                    <div className="w-full max-w-xs space-y-4">
                        <button onClick={onCreate} className="w-full bg-emerald-600 hover:bg-emerald-500 font-bold py-4 rounded-xl text-lg shadow transition transform hover:scale-105">New Live Session</button>
                        <button onClick={fetchHistory} className="w-full bg-gray-800 border border-gray-700 hover:bg-gray-700 font-bold py-3 rounded-xl text-sm flex items-center justify-center space-x-2 text-indigo-300"><HistoryIcon className="w-4 h-4" /><span>View Travel Logs</span></button>
                        <div className="relative flex py-2 items-center"><div className="flex-grow border-t border-gray-700"></div><span className="flex-shrink mx-4 text-gray-500 text-xs">OR CONNECT</span><div className="flex-grow border-t border-gray-700"></div></div>
                        <input ref={gameIdInputRef} type="text" placeholder="5-LETTER CODE" className="w-full p-3 rounded-xl bg-gray-800 border-2 border-gray-700 text-center font-bold font-mono text-yellow-400 focus:outline-none focus:border-indigo-500" />
                        <button onClick={onJoin} className="w-full bg-indigo-600 hover:bg-indigo-500 font-bold py-3 rounded-xl">Join Room</button>
                    </div>
                </div>
            );

            if (loading || !isAuthReady) return <div className="flex items-center justify-center h-screen text-gray-400"><DiceIcon className="text-4xl animate-spin text-indigo-500" /></div>;

            return (
                <div className="min-h-screen flex flex-col bg-gray-900">
                    {showConfirm && <ConfirmationModal message={confirmMessage} onConfirm={() => handleConfirmDecision(true)} onCancel={() => handleConfirmDecision(false)} />}
                    {showScoringGuide && <ScoringGuide onClose={() => setShowScoringGuide(false)} />}
                    {currentView === 'scorer' && <ScorerView />}
                    {currentView === 'display' && <DisplayView />}
                    {currentView === 'history' && <HistoryView />}
                </div>
            );
        };

        const ConfirmationModal = ({ message, onConfirm, onCancel }) => (
            <div className="fixed inset-0 bg-gray-900 bg-opacity-80 flex items-center justify-center z-50 p-4">
                <div className="bg-gray-800 p-6 rounded-xl border border-gray-700 max-w-xs w-full text-center text-white">
                    <p className="font-semibold mb-4">{message}</p>
                    <div className="flex space-x-3 justify-center">
                        <button onClick={onCancel} className="bg-gray-700 px-4 py-2 rounded-lg text-sm">Cancel</button>
                        <button onClick={onConfirm} className="bg-red-500 px-4 py-2 rounded-lg font-bold text-sm">Confirm</button>
                    </div>
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
